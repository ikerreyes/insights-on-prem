---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: insights-on-prem-smoke-test-pipeline
spec:
  description: |
    Minimal pipeline to test whether inline taskSpec passes Konflux validation.
    Temporarily stripped of provision/deprovision to isolate the test.
  params:
    - name: SNAPSHOT
      description: The JSON string of the Snapshot under test
      type: string
  tasks:
    - name: inline-test
      taskSpec:
        steps:
          - name: hello
            image: registry.access.redhat.com/ubi9-minimal:latest
            script: |
              #!/bin/sh
              echo "Inline taskSpec works!"
              date
              echo "Done."
