---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: deploy-service
spec:
  description: |
    Deploys the insights-on-prem service image from the Konflux SNAPSHOT
    as a simple Deployment on the target cluster.
  params:
    - name: kubeconfigSecretRef
      type: string
      description: Name of the Secret containing the kubeconfig for the target cluster
    - name: SNAPSHOT
      type: string
      description: The JSON string of the Snapshot under test
    - name: namespace
      type: string
      description: Namespace to deploy the service into
  steps:
    - name: deploy-service
      image: registry.redhat.io/openshift4/ose-cli:latest
      env:
        - name: KUBECONFIG_VALUE
          valueFrom:
            secretKeyRef:
              name: $(params.kubeconfigSecretRef)
              key: kubeconfig
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: NAMESPACE
          value: $(params.namespace)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        KUBECONFIG="$(mktemp)"
        trap 'rm -f "$KUBECONFIG"' EXIT
        echo "$KUBECONFIG_VALUE" > "$KUBECONFIG"
        export KUBECONFIG

        SERVICE_IMAGE=$(echo "$SNAPSHOT" | jq -r \
          '.components[] | select(.name == "insights-on-prem") | .containerImage')
        echo "Deploying service image: $SERVICE_IMAGE"

        oc create namespace "$NAMESPACE"

        # TODO: Replace with add-on deployment once the add-on controller is ready.
        # For now, deploy as a simple Deployment to validate the image starts.
        oc apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: insights-on-prem
          namespace: $NAMESPACE
          labels:
            app: insights-on-prem
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: insights-on-prem
          template:
            metadata:
              labels:
                app: insights-on-prem
            spec:
              containers:
                - name: insights-on-prem
                  image: $SERVICE_IMAGE
                  ports:
                    - containerPort: 8080
        EOF

        echo "Waiting for deployment rollout..."
        oc rollout status deployment/insights-on-prem -n "$NAMESPACE" --timeout=300s
        echo "Service deployed successfully"
